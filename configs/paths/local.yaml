paths:
  dataset_backend: local
  dataset_dir: data/samples/collide2v_tiny
  tmp_data_dir: data/tmp
  processed_data_dir: data/processed/collide2v_tiny

data:
  max_files: 2
  max_rows: 10000
  feature_columns: null
  label_column: process_id
  exclude_columns:
    - event_id
    - process_name
    - view
  output_subdir: vectorized
  processes: null
  materialize_local_parquet: false
