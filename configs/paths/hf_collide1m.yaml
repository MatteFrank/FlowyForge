paths:
  dataset_backend: hf
  hf_dataset_name: fastmachinelearning/collide-1m
  hf_split: train
  hf_data_dirs:
    - WJetsToLNu_13TeV-madgraphMLM-pythia8
    - DYJetsToLL_13TeV-madgraphMLM-pythia8
  local_cache_dir: data/hf_cache/collide-1m
  dataset_dir: data/hf_cache/collide-1m/parquet_export
  tmp_data_dir: data/tmp
  processed_data_dir: data/processed/collide1m

data:
  max_files: 1
  max_rows_per_process: 20
  max_rows: null
  hf_materialization_mode: summary
  hf_summary_columns:
    - FullReco_MET_MET
    - FullReco_MET_Phi
    - FullReco_JetAK4_PT
    - FullReco_Electron_PT
    - FullReco_MuonTight_PT
    - L1T_MET_MET
    - L1T_JetAK4_PT
  feature_columns: null
  # If this column is absent in the materialized HF sample, vectorization runs X-only.
  label_column: process_id
  exclude_columns:
    - event_id
    - process_name
    - view
  output_subdir: vectorized
  processes: null
  materialize_local_parquet: true

preprocessing:
  method: standardize
  eps: 1.0e-6
  input_subdir: vectorized
  output_subdir: preprocessed
  copy_labels: true

training:
  task: classification
  model: mlp
  input_subdir: preprocessed
  output_subdir: training/classification_mlp
  batch_size: 16
  epochs: 20
  learning_rate: 1.0e-3
  weight_decay: 0.0
  hidden_dim: 32
  dropout: 0.0
  val_fraction: 0.2
  test_fraction: 0.2
  seed: 42
  device: auto

evaluation:
  task: classification
  model: mlp
  input_subdir: preprocessed
  training_subdir: training/classification_mlp
  output_subdir: evaluation/classification_mlp
  split: test
  batch_size: 64
  device: auto
