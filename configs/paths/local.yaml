paths:
  dataset_backend: local
  dataset_dir: data/samples/collide2v_tiny
  tmp_data_dir: data/tmp
  processed_data_dir: data/processed/collide2v_tiny

data:
  max_files: 2
  max_rows: 10000
  feature_columns: null
  label_column: process_id
  exclude_columns:
    - event_id
    - process_name
    - view
  output_subdir: vectorized
  processes: null
  materialize_local_parquet: false

preprocessing:
  method: standardize
  eps: 1.0e-6
  input_subdir: vectorized
  output_subdir: preprocessed
  copy_labels: true

training:
  task: classification
  model: mlp
  input_subdir: preprocessed
  output_subdir: training/classification_mlp
  batch_size: 16
  epochs: 20
  learning_rate: 1.0e-3
  weight_decay: 0.0
  hidden_dim: 32
  dropout: 0.0
  val_fraction: 0.2
  test_fraction: 0.2
  seed: 42
  device: auto

evaluation:
  task: classification
  model: mlp
  input_subdir: preprocessed
  training_subdir: training/classification_mlp
  output_subdir: evaluation/classification_mlp
  split: test
  batch_size: 64
  device: auto
